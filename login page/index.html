<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <ul>
        <li>HOME</li>
        <li>ABOUT</li>
        <li>SERVICE</li>
        <li>CONTACT</li>
        
    </ul>
</nav>

<div class="container">
    <div class="login-box">
        <h2>LOGIN</h2>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button>Login</button>

        <p>Don't have an account? <a href="#">Register</a></p>
    </div>
</div>

</body>
</html>
